#    joints: [1.9000,  0.0000,  0.0000, 3.1400, 1.5708]
#  # Zusammengefaltete Startposition, Base nach links gedreht
#  - name: base_right
#    joints: [1.2000,  0.0000,  0.0000, 3.1400, 1.5708]
#  # Arm hoch, nahe am Roboter
#  - name: shoulder_up
#    joints: [1.5708,  0.3000,  0.0000, 3.1400, 1.5708]
#  - name: shoulder_down
#    joints: [1.5708, -0.3000,  0.0000, 3.1400, 1.5708]
#  - name: elbow_fwd
#    joints: [1.5708,  0.0000,  0.3000, 3.1400, 1.5708]
#  - name: elbow_back
#    joints: [1.5708,  0.0000, -0.3000, 3.1400, 1.5708]
#  - name: left_up
#    joints: [1.8000,  0.2000,  0.0000, 3.1400, 1.5708]
#  - name: right_up
#    joints: [1.3000,  0.2000,  0.0000, 3.1400, 1.5708]
